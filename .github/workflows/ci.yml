name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Install Semgrep
        run: python3 -m pip install semgrep

      - name: Semgrep Scan
        run: semgrep scan --config "p/owasp-top-ten" --config "p/gosec" --config "p/golang" --config "p/security-audit" --error

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...
