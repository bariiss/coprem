version: 2

project_name: coprem

before:
  hooks:
    - go mod tidy

builds:
  - id: coprem
    main: .
    binary: coprem
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: coprem
    ids:
      - coprem
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: bariiss
    name: coprem

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

homebrew_casks:
  - name: coprem
    repository:
      owner: bariiss
      name: homebrew-coprem
      token: "{{ .Env.GITHUB_TOKEN }}"
    homepage: "https://github.com/bariiss/coprem"
    description: "GitHub Enterprise Copilot premium-request analytics CLI"
    binaries:
      - coprem
    # Binary is not code-signed; remove quarantine bit on install so macOS
    # Gatekeeper does not block it.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/coprem"]
          end
